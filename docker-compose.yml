services:
  # ── Kafka Infrastructure ───────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── Producer: Streams HN stories to Kafka ──────────
  hn-producer:
    build: .
    container_name: hn-producer
    command: python kafka/producer/hn_producer.py
    working_dir: /app
    depends_on:
      - kafka
    environment:
      HN_BASE_URL: https://hacker-news.firebaseio.com/v0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: hn-posts
      HN_CATEGORIES: topstories,newstories,beststories
    volumes:
      - .:/app
    restart: unless-stopped

  # ── Consumer: Kafka → Sentiment → DuckDB ───────────
  hn-consumer:
    build: .
    container_name: hn-consumer
    command: python kafka/consumer/sentiment_consumer.py
    working_dir: /app
    depends_on:
      - kafka
      - hn-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: hn-posts
      DB_PATH: /app/hn_sentiment.db
    volumes:
      - .:/app
    restart: unless-stopped

  # ── Dashboard: Streamlit ────────────────────────────
  dashboard:
    build: .
    container_name: hn-dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    working_dir: /app
    depends_on:
      - hn-consumer
    ports:
      - "8502:8501"
    environment:
      DB_PATH: /app/hn_sentiment.db
    volumes:
      - .:/app
    restart: unless-stopped
