version: 2

models:
  - name: stg_hn_posts
    description: "Cleaned Hacker News posts with time dimensions"
    columns:
      - name: post_id
        tests:
          - unique
          - not_null
      - name: category
        tests:
          - not_null
      - name: sentiment_label
        tests:
          - accepted_values:
              values: ['positive', 'negative', 'neutral']
